<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LP Metrics Dashboard — Open-Trafego</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #00F5D4;
      --purple: #7B2FBE;
      --dark: #0A0A0F;
      --surface: #15151F;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: white;
      margin: 0;
      padding: 20px;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-family: 'Orbitron';
      background: linear-gradient(135deg, var(--neon), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
    }
    .stat-value {
      font-family: 'Orbitron';
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--neon), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 10px 0;
    }
    .stat-label {
      color: #888;
      font-size: 0.9rem;
    }
    .chart-container {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
    }
    .chart-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .lp-list {
      display: grid;
      gap: 12px;
    }
    .lp-item {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .lp-item:hover {
      border-color: var(--neon);
      transform: translateX(10px);
    }
    .lp-stats {
      display: flex;
      gap: 20px;
    }
    .lp-stat {
      text-align: center;
    }
    .lp-stat-value {
      font-family: 'Orbitron';
      font-size: 1.2rem;
      color: var(--neon);
    }
    .lp-stat-label {
      font-size: 0.75rem;
      color: #666;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16,185,129,0.2);
      color: var(--success);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
    }
    .pulse-dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .refresh-btn {
      background: linear-gradient(135deg, var(--neon), var(--purple));
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <div>
        <h1>📊 LP Metrics Dashboard</h1>
        <p style="color:#888; margin-top:5px;">Open-Trafego — Landing Pages Performance</p>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <div class="live-badge">
          <div class="pulse-dot"></div>
          LIVE DATA
        </div>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total LP Views</div>
        <div class="stat-value" id="totalViews">0</div>
        <div class="stat-label">↗ +12% vs last week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg. Time on Page</div>
        <div class="stat-value" id="avgTime">0s</div>
        <div class="stat-label">↘ -5% (better)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bounce Rate</div>
        <div class="stat-value" id="bounceRate">0%</div>
        <div class="stat-label">↘ -2% improvement</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conversions</div>
        <div class="stat-value" id="conversions">0</div>
        <div class="stat-label">↗ +23% this week</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <div class="chart-title">Views por LP (últimos 7 dias)</div>
      <canvas id="viewsChart" height="100"></canvas>
    </div>

    <!-- LP List -->
    <div class="chart-container">
      <div class="chart-title">Lista de Landing Pages</div>
      <div class="lp-list" id="lpList">
        <!-- Preenchido via JS -->
      </div>
    </div>
  </div>

  <script>
    // Dados simulados (em produção viria de API)
    const lpData = [
      { name: 'lp1.html', views: 1240, time: '2:34', bounce: '45%', conv: '3.2%' },
      { name: 'lp2.html', views: 890, time: '3:12', bounce: '38%', conv: '4.1%' },
      { name: 'lp3.html', views: 2100, time: '4:05', bounce: '32%', conv: '5.7%' },
      { name: 'lp4.html', views: 1560, time: '2:56', bounce: '41%', conv: '3.8%' },
      { name: 'lp5.html', views: 980, time: '3:30', bounce: '39%', conv: '4.3%' },
      { name: 'lp6.html', views: 3200, time: '5:12', bounce: '28%', conv: '6.2%' },
      { name: 'lp7.html', views: 1800, time: '4:45', bounce: '33%', conv: '5.1%' },
      { name: 'lp8.html', views: 1450, time: '3:22', bounce: '38%', conv: '4.0%' },
      { name: 'lp9.html', views: 2100, time: '4:08', bounce: '35%', conv: '4.8%' },
      { name: 'lp10.html', views: 2800, time: '4:55', bounce: '30%', conv: '5.5%' },
      { name: 'lp11.html', views: 1200, time: '3:10', bounce: '42%', conv: '3.6%' },
      { name: 'lp12.html', views: 950, time: '2:48', bounce: '44%', conv: '3.0%' },
      { name: 'lp13.html', views: 1800, time: '4:20', bounce: '36%', conv: '4.2%' },
      { name: 'lp14.html', views: 2200, time: '5:01', bounce: '31%', conv: '5.3%' },
      { name: 'lp15.html', views: 1600, time: '3:45', bounce: '37%', conv: '4.4%' },
      { name: 'lp16.html', views: 1100, time: '3:05', bounce: '43%', conv: '3.4%' },
      { name: 'lp17.html', views: 1400, time: '3:28', bounce: '40%', conv: '3.9%' },
      { name: 'lp18.html', views: 1900, time: '4:12', bounce: '34%', conv: '4.6%' },
      { name: 'lp19.html', views: 2500, time: '5:22', bounce: '29%', conv: '5.8%' },
      { name: 'lp20.html', views: 3100, time: '5:45', bounce: '27%', conv: '6.4%' }
    ];

    function loadData() {
      // Totals
      const totalViews = lpData.reduce((sum, lp) => sum + lp.views, 0);
      const avgTime = Math.round(lpData.reduce((sum, lp) => {
        const [min, sec] = lp.time.split(':').map(Number);
        return sum + min * 60 + sec;
      }, 0) / lpData.length);
      const avgBounce = Math.round(lpData.reduce((sum, lp) => parseFloat(lp.bounce) || 0, 0) / lpData.length);
      const totalConv = (lpData.reduce((sum, lp) => sum + parseFloat(lp.conv), 0) / lpData.length).toFixed(1);

      document.getElementById('totalViews').textContent = totalViews.toLocaleString();
      document.getElementById('avgTime').innerHTML = `${Math.floor(avgTime / 60)}:${(avgTime % 60).toString().padStart(2, '0')}`;
      document.getElementById('bounceRate').textContent = avgBounce + '%';
      document.getElementById('conversions').textContent = totalConv + '%';

      // Chart
      const ctx = document.getElementById('viewsChart').getContext('2d');
      if (window.viewsChart) window.viewsChart.destroy();
      window.viewsChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: lpData.map(l => l.name),
          datasets: [{
            label: 'Views',
            data: lpData.map(l => l.views),
            backgroundColor: 'rgba(0, 245, 212, 0.6)',
            borderColor: 'rgba(0, 245, 212, 1)',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { 
              ticks: { color: '#888' },
              grid: { color: 'rgba(255,255,255,0.1)' }
            },
            x: {
              ticks: { color: '#888' },
              grid: { display: false }
            }
          }
        }
      });

      // LP List
      const list = document.getElementById('lpList');
      list.innerHTML = '';
      lpData.forEach(lp => {
        const item = document.createElement('div');
        item.className = 'lp-item';
        item.innerHTML = `
          <div>
            <div style="font-weight:600;">${lp.name}</div>
            <div style="font-size:0.8rem; color:#666;">/open-trafego-lps.vercel.app/${lp.name}</div>
          </div>
          <div class="lp-stats">
            <div class="lp-stat">
              <div class="lp-stat-value">${lp.views}</div>
              <div class="lp-stat-label">Views</div>
            </div>
            <div class="lp-stat">
              <div class="lp-stat-value">${lp.time}</div>
              <div class="lp-stat-label">Avg Time</div>
            </div>
            <div class="lp-stat">
              <div class="lp-stat-value">${lp.bounce}</div>
              <div class="lp-stat-label">Bounce</div>
            </div>
            <div class="lp-stat">
              <div class="lp-stat-value" style="color:var(--neon);">${lp.conv}</div>
              <div class="lp-stat-label">Conv.</div>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    // Load on start
    loadData();
    // Auto refresh every 30s
    setInterval(loadData, 30000);
  </script>
</body>
</html>
