<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open-Trafego — 3D Rotate Layers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #00F5D4;
      --purple: #7B2FBE;
      --dark: #0A0A0F;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: white;
      margin: 0;
      overflow-x: hidden;
    }
    .scene {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }
    .layer-1 { transform: translateZ(-300px) rotateX(10deg); }
    .layer-2 { transform: translateZ(-150px) rotateX(5deg); }
    .layer-3 { transform: translateZ(0); }
    .content-card {
      background: rgba(21,21,31,0.85);
      border: 1px solid rgba(0,245,212,0.3);
      border-radius: 24px;
      padding: 50px;
      max-width: 800px;
      backdrop-filter: blur(20px);
    }
    .grid-3d {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    .grid-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .grid-item .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- Layer 3 (front) -->
  <div class="layer layer-3" id="front-layer">
    <div class="content-card text-center">
      <h1 class="text-5xl font-bold mb-6" style="font-family: 'Orbitron'; background:linear-gradient(135deg, var(--neon), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        ROTATE 3D<br>LAYERS
      </h1>
      <p class="text-xl text-gray-400 mb-8">
        Múltiplas camadas 3D que rotacionam independentemente no scroll.
      </p>
      <div class="grid-3d">
        <div class="grid-item">
          <div class="icon">🎯</div>
          <div class="font-bold mb-1">Precisão</div>
          <div class="text-xs text-gray-500">Controle fino</div>
        </div>
        <div class="grid-item">
          <div class="icon">🚀</div>
          <div class="font-bold mb-1">Performance</div>
          <div class="text-xs text-gray-500">GPU加速</div>
        </div>
        <div class="grid-item">
          <div class="icon">🔗</div>
          <div class="font-bold mb-1">Integração</div>
          <div class="text-xs text-gray-500">API completa</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Layer 2 (mid) -->
  <div class="layer layer-2" id="mid-layer" style="pointer-events:none;">
    <div class="absolute top-1/4 left-10 bg-white/5 px-6 py-3 rounded-full border border-cyan-500/30">
      <span class="text-cyan-400 font-bold">AUTOMATION</span>
    </div>
    <div class="absolute bottom-1/4 right-10 bg-white/5 px-6 py-3 rounded-full border border-purple-500/30">
      <span class="text-purple-400 font-bold">AI DRIVEN</span>
    </div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-9xl font-bold opacity-5" style="color:var(--neon);">
      ∞
    </div>
  </div>

  <!-- Layer 1 (back) -->
  <div class="layer layer-1" id="back-layer" style="pointer-events:none;">
    <div class="text-9xl font-bold opacity-10" style="color:var(--purple);">OPEN-TRAFEGO</div>
  </div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Rotate layers on scroll
    const backLayer = document.getElementById('back-layer');
    const midLayer = document.getElementById('mid-layer');
    const frontLayer = document.getElementById('front-layer');

    gsap.to(backLayer, {
      rotateX: 15,
      ease: 'none',
      scrollTrigger: {
        trigger: 'body',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1
      }
    });

    gsap.to(midLayer, {
      rotateX: 8,
      ease: 'none',
      scrollTrigger: {
        trigger: 'body',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1
      }
    });

    gsap.to(frontLayer, {
      rotateX: -2,
      ease: 'none',
      scrollTrigger: {
        trigger: 'body',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1
      }
    });

    // Floating elements in mid layer
    gsap.to('#mid-layer .absolute', {
      y: -50,
      ease: 'none',
      scrollTrigger: {
        trigger: 'body',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 0.5
      }
    });
  </script>
</body>
</html>
